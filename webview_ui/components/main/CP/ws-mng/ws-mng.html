<!-- 1. Header -->
<div fx="sb" pd="s" style="flex-shrink: 0;">
    <button tc="3" id="back-to-dashboard-btn" class="btn bl sq" bg="none" hv-bg="3" hv-tc="1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="arrow-left" aria-hidden="true" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
    </button>
    <span tc="2" style="font-size: 12px; text-transform: uppercase;" id="workspace-name">Workspace</span>
    <button tc="3" id="workspace-settings-btn" class="btn bl sq" bg="none" hv-bg="3" sz="s" hv-tc="1">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
</div>

<!-- 2. Tools Container (含操作按钮行和动态搜索栏) -->
<div fx="col" id="workspace-tools" style="flex-shrink: 0;" bd="b1">
    <!-- 操作按钮行 (平均占据该行) -->
    <div fx="sb" gap="xs" pd="0 xs s xs" style="width: 100%;">
        <button class="btn bl sq" bg="none" hv-bg="3" tc="3" hv-tc="1" id="ws-search-btn" style="flex: 1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
        <button class="btn bl sq" bg="none" hv-bg="3" tc="3" hv-tc="1" id="ws-sort-btn" style="flex: 1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 16H3" /><path d="M16 16H21" /><path d="M16 8H21" />
                <path d="M3 8H11" /><path d="M14 12L16 14L18 12" />
                <path d="M8 12L10 14L12 12" />
            </svg>
        </button>
        <button class="btn bl sq" bg="none" hv-bg="3" tc="3" hv-tc="1" id="ws-sort-alt-btn" style="flex: 1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5h10" />
                <path d="M11 9h7" />
                <path d="M11 13h4" />
                <path d="m3 17 3 3 3-3" />
                <path d="M6 18V4" />
            </svg>
        </button>
        <button class="btn bl sq" bg="none" hv-bg="3" tc="3" hv-tc="1" id="ws-more-btn" style="flex: 1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1" /><circle cx="19" cy="12" r="1" />
                <circle cx="5" cy="12" r="1" />
            </svg>
        </button>
    </div>

    <!-- 动态搜索栏 -->
    <!-- 动态搜索栏 -->
    <div id="ws-search-panel" class="search-panel-collapsed" fx="col" gap="xs">
        <div fx="row" pd="xs" bd="1" rd="s" bg="1" foc="bd-act">
            <input type="text" class="inp bl" id="ws-search-input" placeholder="Search files..." style="flex: 1; padding: 2px 4px; font-size: 12px;">
            <div fx="row">
                <button class="btn bl sq ws-search-panel-btn" bg="none" hv-bg="3" tc="3" hv-tc="err" id="ws-search-clear-btn" title="Clear Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" /><path d="m6 6 12 12" />
                    </svg>
                </button>
                <label class="chk bl sq ws-search-panel-btn" bg="none" hv-bg="3" ac-bg="act" title="Match Case">
                    <input type="checkbox" id="ws-search-opt-case">
                    <span>Aa</span>
                </label>
                <label class="chk bl sq ws-search-panel-btn" bg="none" hv-bg="3" ac-bg="act" title="Whole Word">
                    <input type="checkbox" id="ws-search-opt-word">
                    <span>W</span>
                </label>
                <label class="chk bl sq ws-search-panel-btn" bg="none" hv-bg="3" ac-bg="act" title="Use Regular Expression">
                    <input type="checkbox" id="ws-search-opt-regex">
                    <span>.*</span>
                </label>
                <label class="chk bl sq ws-search-panel-btn" bg="none" hv-bg="3" ac-bg="act" title="Search in File Content">
                    <input type="checkbox" id="ws-search-opt-content">
                    <span>C</span>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- 3. Workspace Tree -->
<div id="workspace-tree" class="workspace-tree scroll-y" style="flex-grow: 1;">
    <!-- JS将在此渲染内容 -->
</div>

<!-- Context Menu -->
<div id="context-menu" class="menu glass" style="display: none; user-select: none;">
    <div class="menu-item" data-action="newPage">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="file-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-file-plus">
            <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"></path>
            <path d="M14 2v5a1 1 0 0 0 1 1h5"></path>
            <path d="M9 15h6"></path>
            <path d="M12 18v-6"></path>
        </svg>
        New Page
    </div>
    <div class="menu-item" data-action="newGraph" style="pointer-events: none; cursor: not-allowed; ">New Graph</div>
    <div class="menu-item" data-action="newDatabase">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="database-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-database">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
            <line x1="12" y1="9" x2="12" y2="15"></line>
            <line x1="9" y1="12" x2="15" y2="12"></line>
        </svg>
        New Database
    </div>
    <div class="menu-item" data-action="newFolder">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="folder-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-folder-plus">
            <path d="M12 10v6"></path>
            <path d="M9 13h6"></path>
            <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path>
        </svg>
        New Folder
    </div>
    <div class="menu-sep"></div>
    <div class="menu-item" data-action="expandAll">Expand All</div>
    <div class="menu-item" data-action="collapseAll">Collapse All</div>
    <div class="menu-item danger" data-action="delete">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="trash-2" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-trash-2">
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
            <path d="M3 6h18"></path>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Delete
    </div>
</div>
