<!-- components/main/main.html -->
<!-- PEEK TRIGGERS NOW AT THE TOP LEVEL -->
<div id="sidebar-peek-trigger"></div>

<div class="app-container" style="user-select: none;">
    <!-- 左侧边栏 (属于 Main) -->
    <aside class="card glass" pd="s" gap="xs" fx="col" id="sidebar">
        <div fx="sb" pd="s">
            <button tc="3" id="back-to-dashboard-btn" class="btn bl sq" bg="none" hv-bg="3" hv-tc="1">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="arrow-left" aria-hidden="true" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
            </button>
            <span tc="2" style="font-size: 12px; text-transform: uppercase;" id="workspace-name">Workspace</span>
            <button tc="3" id="workspace-settings-btn" class="btn bl sq" bg="none" hv-bg="3" sz="s" hv-tc="1">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
        <div id="workspace-tree" class="workspace-tree">
            <div>Loading workspace...</div>
        </div>
        <div class="sidebar-footer">
            <button id="sidebar-toggle-btn" class="sidebar-footer-btn" title="Collapse sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span>Collapse</span>
            </button>
            <button id="export-btn">Cook Workspace</button>
        </div>
        <div id="sidebar-resizer"></div>
    </aside>

    <!-- 主内容区域 (属于 Main) -->
    <main fx="col" id="main-content">
        <!-- 窗口控件 (属于 Main) -->
        <div id="window-controls" gap="xs">
            <button id="toggle-fullscreen-btn-wc" tc="2" class="btn bl sq" bg="none" hv-bg="3" hv-tc="1" title="Toggle Fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
            <button id="minimize-btn" tc="2" class="btn bl sq" bg="none" hv-bg="3" hv-tc="1" title="Minimize">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button id="maximize-btn" tc="2" class="btn bl sq" bg="none" hv-bg="3" hv-tc="1" title="Maximize">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
            <button id="close-btn" tc="2" class="btn bl sq" bg="none" hv-bg="err" hv-tc="1" title="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <!-- 标签页栏 (属于 Main) -->
        <div id="tab-bar">
            <div id="dynamic-tabs-container"></div>
        </div>

        <!-- 标签页内容容器 (属于 Main，但内容由 Editor 填充) -->
        <div id="tab-content-container">
            <div id="no-file-message">Open a file from the workspace to start editing.</div>
            <!-- Editor instances will be dynamically inserted here -->
        </div>

        <div id="right-sidebar-peek-trigger"></div>
    </main>
</div>

<!-- 全局 Modals 和 Menus (由 Main 管理) -->
<div id="export-overlay" class="export-overlay" style="display: none; user-select: none;">
    <div class="export-modal">
        <h3>Cooking</h3>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="export-status">Preparing Files...</p>
    </div>
</div>

<div id="cook-settings-modal" class="export-overlay" style="display: none; user-select: none;">
    <div class="cook-settings-content">
        <h3>Cook Workspace Options</h3>
        <div class="cook-options-list">
            <div class="cook-option"><input type="checkbox" id="copy-local-images" checked><label for="copy-local-images">Copy local images to the build folder.</label></div>
            <div class="cook-option"><input type="checkbox" id="download-online-images"><label for="download-online-images">Attempt to download online images to the build folder.</label></div>
            <div class="cook-option"><input type="checkbox" id="disable-drag-export" checked><label for="disable-drag-export">Make content non-draggable for easier text selection.</label></div>
        </div>
        <div class="cook-settings-footer">
            <button id="cancel-cook-btn">Cancel</button>
            <button id="start-cook-btn" class="primary-btn">Start Cooking</button>
        </div>
    </div>
</div>

<div id="context-menu" class="menu glass" style="display: none; user-select: none;">
    <div class="menu-item" data-action="newPage">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="file-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-file-plus"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"></path><path d="M14 2v5a1 1 0 0 0 1 1h5"></path><path d="M9 15h6"></path><path d="M12 18v-6"></path></svg>
        New Page
    </div>
    <div class="menu-item" data-action="newGraph" style="pointer-events: none; cursor: not-allowed; ">New Graph</div>
    <div class="menu-item" data-action="newDatabase">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="database-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-database">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
            <line x1="12" y1="9" x2="12" y2="15"></line>
            <line x1="9" y1="12" x2="15" y2="12"></line>
        </svg>
        New Database
    </div>
    <div class="menu-item" data-action="newFolder">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="folder-plus" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-folder-plus"><path d="M12 10v6"></path><path d="M9 13h6"></path><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg>
        New Folder
    </div>
    <div class="menu-sep"></div>
    <div class="menu-item danger" data-action="delete">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="trash-2" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-trash-2"><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        Delete
    </div>
</div>
    
<!-- 报错提示弹窗 -->
<div id="error-toast-container" style="position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none;"></div>
