<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeritNote</title>

    <script>
        (function () {
            const ua = navigator.userAgent.toLowerCase();
            const html = document.documentElement;
            if (ua.includes('android')) {
                window.currentOS = 'android';
                html.className += ' os-android';
            } else {
                window.currentOS = 'windows';
                html.className += ' os-windows';
            }
        })();
    </script>

    <!-- Vendor -->
    <link rel="stylesheet" href="vendor/highlight/theme.css">

    <!-- 1. Load global theme variables first -->
    <link rel="stylesheet" href="components/main/theme.css">
    <link rel="stylesheet" href="components/ui-lib/theme.css">
    <link rel="stylesheet" href="components/ui-lib/ui-lib.css">
    <link rel="stylesheet" href="components/ui-lib/tools/kv-form.css">

    <!-- 2. Load component-specific styles -->
    <link rel="stylesheet" href="components/main/ConfigModal.css">

    <link rel="stylesheet" href="components/main/main.css">

    <link rel="stylesheet" href="components/main/CP/ws-mng/ws-mng.css">

    <link rel="stylesheet" href="page-theme.css">


    <link rel="stylesheet" href="components/page-editor/page-editor.css">
    <link rel="stylesheet" href="components/database-editor/database-editor.css">


    <!-- <link rel="stylesheet" href="components/graph-editor/graph-editor.css"> -->
    <!-- 3. Load block-specific styles -->
    <!-- Shared -->
    <link rel="stylesheet" href="blocks/shared/block-core.css">
    <!-- Individual -->
    <link rel="stylesheet" href="blocks/callout/callout.css">
    <link rel="stylesheet" href="blocks/code/code.css">
    <link rel="stylesheet" href="blocks/columns/columns.css">
    <link rel="stylesheet" href="blocks/heading/heading.css">
    <link rel="stylesheet" href="blocks/media/image.css">
    <link rel="stylesheet" href="blocks/media/video.css">
    <link rel="stylesheet" href="blocks/media/audio.css">
    <link rel="stylesheet" href="blocks/link-button/link-button.css">
    <link rel="stylesheet" href="blocks/list-items/list-item-shared.css">
    <link rel="stylesheet" href="blocks/quote/quote.css">
    <link rel="stylesheet" href="blocks/table/table.css">
    <link rel="stylesheet" href="blocks/data/table-view.css">

</head>
<body>
    <!-- The main application shell will be loaded here -->
    <div id="app-root"></div>

    <!-- Scripts -->
    <script src="main.min.js"></script>

    <script src="blocks/Block.js"></script>
    <script src="blocks/TextBlock.js"></script>
    <!-- Load All Concrete Block Implementations -->
    <script src="blocks/paragraph/ParagraphBlock.js"></script>
    <script src="blocks/heading/Heading1Block.js"></script>
    <script src="blocks/heading/Heading2Block.js"></script>
    <script src="blocks/media/ImageBlock.js"></script>
    <script src="blocks/media/VideoBlock.js"></script>
    <script src="blocks/media/AudioBlock.js"></script>
    <script src="blocks/link-button/LinkButtonBlock.js"></script>
    <script src="blocks/callout/CalloutBlock.js"></script>
    <script src="blocks/columns/ColumnBlock.js"></script>
    <script src="blocks/columns/ColumnsBlock.js"></script>
    <script src="blocks/code/CodeBlock.js"></script>
    <script src="blocks/data/DataBlock.js"></script>
    <script src="blocks/data/TableViewBlock.js"></script>
    <script src="blocks/list-items/BulletedListItemBlock.js"></script>
    <script src="blocks/list-items/TodoListItemBlock.js"></script>
    <script src="blocks/list-items/NumberedListItemBlock.js"></script>
    <script src="blocks/list-items/ToggleListItemBlock.js"></script>
    <script src="blocks/quote/QuoteBlock.js"></script>
    <script src="blocks/table/TableBlock.js"></script>

    <!-- <script src="components/graph-editor/graph-editor.js"></script> -->
    <!-- Vendor Scripts -->
    <script src="vendor/highlight/highlight.min.js"></script>

    <script>
        // Main application entry point
        document.addEventListener('DOMContentLoaded', async () => {
            const appRoot = document.getElementById('app-root');

            // Fetch and inject the main HTML structure
            const response = await fetch('components/main/main.html');
            appRoot.innerHTML = await response.text();

            // After the HTML is injected, the DOM is ready for the main script.
            // We check if the initialization function exists on the window object and then call it.
            if (window.initializeMainComponent) {
                window.initializeMainComponent();
            } else {
                console.error("Main component initialization function not found!");
            }
        });
    </script>
</body>
</html>
